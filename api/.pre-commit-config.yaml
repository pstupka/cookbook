repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -c 'cd api && .venv/bin/pytest tests/ -q'
        language: system
        pass_filenames: false
        stages: [pre-push]